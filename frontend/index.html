<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Recommender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            color: white;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
        }

        .search-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            animation: fadeInUp 1s ease-out;
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 20px 60px 20px 20px;
            font-size: 1.1rem;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
            background: white;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-btn:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .search-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .suggestion-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            border-bottom: 1px solid #f0f0f0;
        }

        .suggestion-item:hover {
            background-color: #f8f9ff;
            color: #667eea;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        .results-section {
            display: none;
            animation: fadeInUp 0.8s ease-out;
        }

        .selected-anime {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .selected-anime h3 {
            color: #667eea;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .recommendation-card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .recommendation-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .recommendation-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(45deg, #667eea, #764ba2);
        }

        .rank-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .anime-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            padding-right: 40px;
        }

        .anime-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .rating {
            background: #ffd700;
            color: #333;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .genre {
            background: #e8f2ff;
            color: #667eea;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .similarity-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .similarity-fill {
            height: 100%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            transition: width 0.8s ease;
        }

        .error-message {
            background: #fff3f3;
            color: #d63384;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #d63384;
            display: none;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .search-section {
                padding: 20px;
            }
            
            .recommendations-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🎌 Anime Recommender</h1>
            <p>Descubre nuevos animes basados en tus favoritos</p>
        </header>

        <div class="search-section">
            <div class="search-container">
                <input 
                    type="text" 
                    class="search-input" 
                    placeholder="Escribe el nombre de un anime..."
                    id="animeInput"
                    autocomplete="off"
                >
                <button class="search-btn" id="searchBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </button>
                <div class="suggestions" id="suggestions"></div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Buscando recomendaciones...</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="selected-anime" id="selectedAnime"></div>
            <div class="recommendations-grid" id="recommendationsGrid"></div>
        </div>
    </div>

    <script>
        class AnimeRecommender {
            constructor() {
                this.apiBaseUrl = 'http://localhost:8000'; // Cambia por tu URL de API
                this.animeList = [];
                this.debounceTimer = null;
                this.init();
            }

            async init() {
                await this.loadAnimeList();
                this.setupEventListeners();
            }

            async loadAnimeList() {
                try {
                    const response = await fetch(`${this.apiBaseUrl}/animes`);
                    const data = await response.json();
                    if (data.success) {
                        this.animeList = data.animes;
                    }
                } catch (error) {
                    console.error('Error loading anime list:', error);
                }
            }

            setupEventListeners() {
                const input = document.getElementById('animeInput');
                const searchBtn = document.getElementById('searchBtn');
                const suggestions = document.getElementById('suggestions');

                input.addEventListener('input', (e) => this.handleInput(e));
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        this.searchRecommendations(input.value.trim());
                    }
                });
                
                searchBtn.addEventListener('click', () => {
                    this.searchRecommendations(input.value.trim());
                });

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.search-container')) {
                        suggestions.style.display = 'none';
                    }
                });
            }

            handleInput(e) {
                const query = e.target.value.trim();
                
                clearTimeout(this.debounceTimer);
                this.debounceTimer = setTimeout(() => {
                    this.showSuggestions(query);
                }, 300);
            }

            showSuggestions(query) {
                const suggestions = document.getElementById('suggestions');
                
                if (!query) {
                    suggestions.style.display = 'none';
                    return;
                }

                const filtered = this.animeList.filter(anime => 
                    anime.toLowerCase().includes(query.toLowerCase())
                ).slice(0, 8);

                if (filtered.length === 0) {
                    suggestions.style.display = 'none';
                    return;
                }

                suggestions.innerHTML = filtered.map(anime => 
                    `<div class="suggestion-item" onclick="animeRecommender.selectAnime('${anime}')">${anime}</div>`
                ).join('');

                suggestions.style.display = 'block';
            }

            selectAnime(animeName) {
                document.getElementById('animeInput').value = animeName;
                document.getElementById('suggestions').style.display = 'none';
                this.searchRecommendations(animeName);
            }

            async searchRecommendations(animeName) {
                if (!animeName) {
                    this.showError('Por favor, ingresa el nombre de un anime');
                    return;
                }

                this.showLoading(true);
                this.hideError();

                try {
                    const response = await fetch(`${this.apiBaseUrl}/recommend`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            anime_name: animeName,
                            num_recommendations: 12
                        })
                    });

                    const data = await response.json();
                    
                    if (data.success) {
                        this.displayResults(animeName, data.data);
                    } else {
                        this.showError(data.message || 'No se encontraron recomendaciones');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    this.showError('Error al conectar con el servidor. Asegúrate de que la API esté ejecutándose.');
                } finally {
                    this.showLoading(false);
                }
            }

            displayResults(selectedAnime, recommendations) {
                const selectedAnimeEl = document.getElementById('selectedAnime');
                const recommendationsGrid = document.getElementById('recommendationsGrid');
                const resultsSection = document.getElementById('resultsSection');

                selectedAnimeEl.innerHTML = `
                    <h3>Anime seleccionado:</h3>
                    <p><strong>${selectedAnime}</strong></p>
                    <p>Encontramos ${recommendations.length} recomendaciones para ti</p>
                `;

                recommendationsGrid.innerHTML = recommendations.map(anime => `
                    <div class="recommendation-card">
                        <div class="rank-badge">${anime.rank}</div>
                        <div class="anime-name">${anime.name}</div>
                        <div class="anime-info">
                            <span class="rating">⭐ ${anime.rating.toFixed(1)}</span>
                            <span class="genre">${anime.genre}</span>
                        </div>
                        <div class="similarity-bar">
                            <div class="similarity-fill" style="width: ${anime.similarity_score * 100}%"></div>
                        </div>
                        <small style="color: #666; margin-top: 5px; display: block;">
                            Similitud: ${(anime.similarity_score * 100).toFixed(1)}%
                        </small>
                    </div>
                `).join('');

                resultsSection.style.display = 'block';
                resultsSection.scrollIntoView({ behavior: 'smooth' });
            }

            showLoading(show) {
                document.getElementById('loading').style.display = show ? 'block' : 'none';
            }

            showError(message) {
                const errorEl = document.getElementById('errorMessage');
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            }

            hideError() {
                document.getElementById('errorMessage').style.display = 'none';
            }
        }

        // Inicializar la aplicación
        const animeRecommender = new AnimeRecommender();
    </script>
</body>
</html>
